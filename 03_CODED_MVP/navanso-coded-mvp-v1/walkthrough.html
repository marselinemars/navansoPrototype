<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Navanso · Parcours commenté</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<script>/* Initial dir/lang from localStorage to avoid LTR→RTL flash for AR users. */
  (function(){var l=localStorage.getItem('nv_lang')==='ar'?'ar':'fr';
   document.documentElement.dir=l==='ar'?'rtl':'ltr';
   document.documentElement.lang=l;})();</script>
<style>
:root{
  --blue-700:#2456B5; --blue-800:#1E3A8A; --blue-600:#3A76E8; --blue-100:#D9E4FB; --blue-50:#EEF3FD;
  --green-700:#1F8A6D; --green-600:#27A085; --green-100:#D6F0E2; --green-50:#E6F6EF;
  --orange-600:#D8632E; --orange-500:#EE8147; --orange-50:#FDEEDF;
  --ink:#16202E; --ink-2:#243042; --muted:#5B6678; --faint:#8D97AB;
  --line:#E5E9F0; --line-2:#F0F2F7; --bg:#F4F6FA;
  --font:'Inter',system-ui,sans-serif;
  --font-d:'Plus Jakarta Sans','Inter',system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0}
body{font-family:var(--font);background:#0B1220;color:var(--ink);overflow:hidden}
button{font-family:inherit}

.stage{
  display:grid;
  grid-template-columns:1fr 400px;
  grid-template-rows:64px 1fr 76px;
  grid-template-areas:
    "topbar topbar"
    "frame  commentary"
    "footer footer";
  height:100vh; width:100vw;
}

/* TOPBAR */
.topbar{
  grid-area:topbar; background:#0B1220; color:#fff;
  display:flex; align-items:center; gap:16px;
  padding:0 22px; border-bottom:1px solid #1B2435;
}
.topbar .brand{display:flex;align-items:center;gap:10px;font-family:var(--font-d);font-weight:800;letter-spacing:-.01em;font-size:18px}
.topbar .brand img{height:26px;width:26px}
.topbar .title{font-weight:600;color:#A8B2C6;font-size:13.5px}
.topbar .spacer{flex:1}
.topbar .pick{
  background:#162033; color:#fff; border:1px solid #243049; border-radius:9px;
  padding:7px 11px; font-size:13px; outline:none; min-width:280px;
}
.topbar .help-btn{
  background:transparent; color:#A8B2C6; border:1px solid #243049; border-radius:9px;
  padding:7px 12px; font-size:12.5px; font-weight:600; cursor:pointer;
}
.topbar .help-btn:hover{background:#162033;color:#fff}
.mode-seg{
  display:inline-flex; background:#162033; border:1px solid #243049; border-radius:9px; padding:3px;
}
.mode-seg button{
  background:transparent; color:#A8B2C6; border:0; padding:6px 12px; font-size:12.5px;
  font-weight:600; border-radius:7px; cursor:pointer; transition:.15s ease;
}
.mode-seg button.on{background:linear-gradient(135deg,#3A76E8,#2456B5); color:#fff; box-shadow:0 1px 0 rgba(255,255,255,.06) inset}
.mode-seg button:hover:not(.on){background:rgba(255,255,255,.05); color:#fff}

/* Language toggle — same dark style as mode-seg */
.lang-seg{display:inline-flex; background:#162033; border:1px solid #243049; border-radius:8px; padding:2px}
.lang-seg button{background:transparent; color:#A8B2C6; border:0; padding:5px 9px; font-size:12px; font-weight:700; border-radius:6px; cursor:pointer; min-width:28px; transition:.15s ease}
.lang-seg button.on{background:#2456B5; color:#fff}
.lang-seg button:hover:not(.on){background:rgba(255,255,255,.05); color:#fff}
.lang-seg button[data-lang="ar"]{font-family:'Tajawal','Inter',sans-serif; font-size:13.5px}

/* RTL adjustments for the walkthrough chrome */
[dir="rtl"] body, [dir="rtl"] .topbar, [dir="rtl"] .comm-pane,
[dir="rtl"] .title, [dir="rtl"] .commentary p,
[dir="rtl"] .why p, [dir="rtl"] .quote p, [dir="rtl"] .act-badge,
[dir="rtl"] .step-num, [dir="rtl"] .mobile-hint, [dir="rtl"] .btn,
[dir="rtl"] .progress .label, [dir="rtl"] .no-frame .card,
[dir="rtl"] .topbar .title, [dir="rtl"] .topbar .pick{
  font-family:'Tajawal','Inter',system-ui,sans-serif;
}
[dir="rtl"] .comm-pane{border-left:0; border-right:1px solid var(--line)}
[dir="rtl"] .comm-pane::before{left:auto; right:0; border-radius:3px 0 0 3px}

/* FRAME PANE */
.frame-pane{grid-area:frame; position:relative; background:#0F1521; overflow:hidden}
.frame-wrap{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  padding:20px; overflow:hidden;
}
.iframe-desktop{
  width:1440px; height:900px; border:0; background:#fff;
  box-shadow:0 30px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.05);
  border-radius:14px; transform:scale(0.62); transform-origin:center center;
  transition:opacity .25s ease;
}
.iframe-mobile-wrap{
  position:relative; width:400px; height:740px; padding:12px;
  background:#0F1521; border:1.5px solid #1F2840; border-radius:42px;
  box-shadow:0 30px 80px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.04);
}
.iframe-mobile-wrap::before{
  content:''; position:absolute; top:6px; left:50%; transform:translateX(-50%);
  width:88px; height:5px; background:#1F2840; border-radius:99px;
}
.iframe-mobile{
  width:100%; height:100%; border:0; background:#fff; border-radius:30px;
}
.frame-loading{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  color:#5C6885; font-size:13px; pointer-events:none; opacity:0; transition:opacity .2s;
}
.frame-loading.on{opacity:1}
.no-frame{
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 0%, rgba(46,168,108,.10), transparent 60%),
             radial-gradient(ellipse at 80% 100%, rgba(58,118,232,.10), transparent 60%),
             #0B1220;
}
.no-frame .card{
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
  border-radius:18px; padding:54px 56px; max-width:680px; text-align:center; color:#E2E7F3;
  box-shadow:0 20px 60px rgba(0,0,0,.40);
}
.no-frame .card .kicker{
  color:#86E5C7; font-size:12px; font-weight:700; letter-spacing:.10em; text-transform:uppercase;
  margin-bottom:14px;
}
.no-frame .card h2{
  font-family:var(--font-d); font-size:34px; font-weight:800; line-height:1.12;
  margin:0 0 18px; letter-spacing:-.015em;
}
.no-frame .card p{margin:0 0 14px; color:#B6C0D4; font-size:15.5px; line-height:1.55}
.no-frame .layers{display:grid;gap:14px;margin-top:24px;text-align:left}
.no-frame .layer{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 16px;background:rgba(255,255,255,.04);border-radius:12px;border:1px solid rgba(255,255,255,.06);
}
.no-frame .layer .num{
  flex:none; width:32px;height:32px;border-radius:9px;display:grid;place-items:center;
  font-family:var(--font-d);font-weight:800;font-size:14px;color:#fff;
}
.no-frame .layer.l1 .num{background:linear-gradient(135deg,#27A085,#1F8A6D)}
.no-frame .layer.l2 .num{background:linear-gradient(135deg,#3A76E8,#2456B5)}
.no-frame .layer.l3 .num{background:linear-gradient(135deg,#EE8147,#D8632E)}
.no-frame .layer h4{margin:0 0 4px;font-size:14.5px;font-weight:700;color:#fff;font-family:var(--font-d)}
.no-frame .layer p{margin:0;font-size:13px;color:#9AA5BB;line-height:1.5}

/* COMMENTARY */
.comm-pane{
  grid-area:commentary; background:#fff; padding:30px 28px 24px;
  overflow-y:auto; border-left:1px solid var(--line);
  display:flex; flex-direction:column; gap:0;
}
.act-row{display:flex; align-items:center; gap:10px; margin-bottom:18px}
.act-badge{
  display:inline-flex; align-items:center; gap:8px;
  padding:5px 11px; border-radius:99px; font-size:11.5px; font-weight:700;
  letter-spacing:.05em; text-transform:uppercase;
}
.act-badge.intro{background:#F1F4FB;color:var(--muted)}
.act-badge.a1{background:var(--green-50);color:var(--green-700)}
.act-badge.a2{background:var(--blue-50);color:var(--blue-700)}
.act-badge.a3{background:var(--orange-50);color:var(--orange-600)}
.act-badge.outils{background:#EEF1F7;color:#3F4A60}
.act-badge.close{background:#0B1220;color:#86E5C7}
.act-badge.valid-parent{background:var(--green-50);color:var(--green-700)}
.act-badge.valid-tutor{background:var(--blue-50);color:var(--blue-700)}
.step-num{font-size:11.5px; font-weight:700; color:var(--faint); letter-spacing:.04em}
.title{
  font-family:var(--font-d); font-size:24px; font-weight:800; line-height:1.2;
  margin:0 0 12px; letter-spacing:-.01em; color:var(--ink);
}
.subtitle{font-size:13px; color:var(--faint); font-weight:600; margin:0 0 18px}
.commentary p{font-size:14.5px; line-height:1.6; color:var(--ink-2); margin:0 0 12px}
.why{
  margin-top:18px; padding:14px 16px; border-radius:12px;
  background:linear-gradient(140deg, var(--blue-50), #fff 70%);
  border:1px solid var(--blue-100);
}
.why .eyebrow{
  font-size:11px; font-weight:800; color:var(--blue-700); letter-spacing:.06em;
  text-transform:uppercase; margin-bottom:6px; display:block;
}
.why p{font-size:13.5px; line-height:1.55; color:var(--ink-2); margin:0}
.quote{
  margin-top:14px; padding:12px 14px; border-left:3px solid var(--green-600);
  background:var(--green-50); border-radius:0 8px 8px 0;
}
.quote span{
  font-size:11px; font-weight:800; color:var(--green-700); letter-spacing:.05em;
  text-transform:uppercase; display:block; margin-bottom:4px;
}
.quote p{font-size:13px; line-height:1.5; color:var(--green-700); margin:0; font-style:italic}

/* FOOTER */
.footer{
  grid-area:footer; background:#0F1521; color:#fff;
  display:flex; align-items:center; gap:14px; padding:0 22px;
  border-top:1px solid #1B2435;
}
.btn{
  display:inline-flex; align-items:center; gap:8px;
  padding:9px 16px; border-radius:10px; font-size:13.5px; font-weight:700;
  border:1px solid #243049; background:#162033; color:#fff; cursor:pointer;
  transition:all .15s ease;
}
.btn:hover:not(:disabled){background:#1E2A42;border-color:#324A75}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.primary{background:linear-gradient(135deg,#3A76E8,#2456B5);border-color:transparent}
.btn.primary:hover{background:linear-gradient(135deg,#4685F3,#2A60C8)}
.progress{flex:1; display:flex; flex-direction:column; gap:6px}
.progress .bar{
  height:4px; background:#1B2435; border-radius:2px; overflow:hidden;
}
.progress .bar i{
  display:block; height:100%; background:linear-gradient(90deg,#27A085,#3A76E8,#EE8147);
  border-radius:2px; transition:width .35s ease;
}
.progress .label{font-size:11.5px; color:#86919E; font-weight:600; letter-spacing:.04em}

/* HELP OVERLAY */
.help-overlay{
  position:fixed; inset:0; background:rgba(8,12,22,.78); z-index:50;
  display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.help-overlay.on{opacity:1; pointer-events:auto}
.help-overlay .box{
  background:#fff; border-radius:18px; max-width:520px; width:100%;
  padding:30px 32px; box-shadow:0 30px 80px rgba(0,0,0,.50);
}
.help-overlay h3{font-family:var(--font-d); font-size:20px; margin:0 0 14px; font-weight:800}
.help-overlay .key{
  display:inline-block; min-width:34px; padding:3px 8px; background:var(--bg);
  border:1px solid var(--line); border-radius:6px; font-family:Menlo,monospace; font-size:12px;
  text-align:center; font-weight:700; margin-right:8px;
}
.help-overlay .kr{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13.5px;color:var(--ink-2)}

/* Guidelines modal — mobile-friendly */
.guide-tip{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-top:1px solid #EEF1F5}
.guide-tip .k{flex:none;min-width:72px;padding:4px 10px;background:#E9F0FF;color:#3A5CDB;border-radius:8px;font-weight:700;font-size:12.5px;text-align:center;font-family:var(--font-d)}
.guide-tip .v{font-size:14px;line-height:1.5;color:#3C4A5C}
[dir="rtl"] #guideContent, [dir="rtl"] #guideCloseLabel{font-family:var(--font-ar,'Tajawal',sans-serif)}
@media (max-width: 540px){
  .help-overlay{padding:14px}
  .help-overlay .box{padding:22px 18px;max-height:calc(100vh - 28px);overflow:auto;border-radius:14px}
  .help-overlay h3{font-size:18px}
  .guide-tip{flex-direction:column;gap:6px;padding:10px 0}
  .guide-tip .k{min-width:0;align-self:flex-start;padding:3px 8px;font-size:11.5px}
  .guide-tip .v{font-size:13.5px;line-height:1.5}
  #guideClose{padding:14px 16px !important;font-size:14.5px !important}
}

/* Mid-size screens — keep the side-by-side layout but shrink the iframe */
@media (max-width: 1280px){
  .stage{grid-template-columns:1fr 360px}
  .iframe-desktop{transform:scale(0.54)}
}
@media (max-width: 1100px){
  .stage{grid-template-columns:1fr 320px}
  .iframe-desktop{transform:scale(0.46)}
}

/* Mobile hint banner — hidden by default (desktop), shown only on mobile */
.mobile-hint{display:none}

/* B19.2 + B19.3 — Mobile (tablets in portrait + phones).
   Layout uses flex column with explicit `order` so the commentary appears
   ABOVE the iframe. The iframe gets a phone-bezel look (rounded corners +
   notch indicator) so it visually reads as an interactive phone screen,
   and a hint banner above it tells the user it's tappable/scrollable. */
@media (max-width: 860px){
  html, body{overflow:auto; height:auto}
  .stage{
    display:flex; flex-direction:column;
    height:auto; min-height:100vh; width:100%;
    grid-template-columns:none; grid-template-rows:none; grid-template-areas:none;
  }

  /* Order: topbar → commentary → frame (with hint inside) → footer */
  .topbar    {order:1; position:sticky; top:0;    z-index:30; height:56px; padding:0 12px; gap:8px}
  .comm-pane {order:2}
  .frame-pane{order:3}
  .footer    {order:4; position:sticky; bottom:0; z-index:30; height:60px; padding:0 14px; gap:10px}

  /* Topbar cleanup */
  .topbar .brand{font-size:15px}
  .topbar .brand img{height:22px;width:22px}
  .topbar .title{display:none}
  .topbar .help-btn{display:none}
  .topbar .pick{display:none}
  .topbar .spacer{display:none}
  .mode-seg{padding:2px; margin-left:auto}
  .mode-seg button{padding:6px 9px; font-size:11.5px; border-radius:6px}

  /* Commentary above the iframe — with a left accent stripe coloured
     by the current act, for a smoother visual tie to the content. */
  .comm-pane{
    grid-area:auto; background:#fff;
    border-left:0; border-bottom:1px solid var(--line);
    padding:18px 20px 20px;
    max-height:none; overflow:visible;
    position:relative;
  }
  .comm-pane::before{
    content:''; position:absolute;
    left:0; top:18px; bottom:18px; width:3px;
    background:var(--act-color, var(--blue-700));
    border-radius:0 3px 3px 0;
  }
  .title{font-size:20px; line-height:1.2; margin:0 0 10px; letter-spacing:-.01em}
  .commentary p{font-size:14px; line-height:1.55; margin-bottom:10px; color:var(--ink-2)}
  .why{margin-top:14px; padding:11px 13px; background:var(--bg); border:1px solid var(--line); border-radius:10px}
  .why .eyebrow{font-size:10.5px}
  .why p{font-size:13px; line-height:1.5}
  .quote{margin-top:12px; padding:10px 13px}
  .quote p{font-size:12.5px; line-height:1.5}
  .quote span{font-size:10.5px}
  .act-row{margin-bottom:12px; gap:8px}
  .act-badge{font-size:10.5px; padding:4px 9px}
  .step-num{font-size:11px}

  /* Mobile hint banner — shows "scroll/tap to interact" cue */
  .mobile-hint{
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:11px 14px;
    background:linear-gradient(180deg,#162033,#0F1521);
    color:#B6C0D4; font-size:12.5px; font-weight:600;
    border-bottom:1px solid #1F2840;
  }
  .mobile-hint .ic{font-size:15px}

  /* Frame pane = phone bezel area */
  .frame-pane{
    grid-area:auto; display:flex; flex-direction:column;
    overflow:visible; padding:0; min-height:560px;
    background:#0B1220;
  }
  .frame-wrap{
    position:relative; inset:auto;
    padding:16px 12px 22px;
    flex:1;
    display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start;
  }
  /* Notch indicator (small pill at top of the frame) */
  .frame-wrap::before{
    content:''; display:block;
    width:70px; height:4px; background:#1F2840;
    border-radius:99px; margin:0 auto 12px;
  }

  /* All iframes (desktop + mobile screens) look like phone-screens on mobile */
  .iframe-desktop, .iframe-mobile{
    width:100%; max-width:360px; margin:0 auto;
    display:block; background:#fff;
    border-radius:18px; transform:none;
    box-shadow:0 10px 28px rgba(0,0,0,.40);
  }
  .iframe-desktop{height:540px}
  .iframe-mobile{height:540px}

  /* Mobile-only slides had their own bezel — strip it (frame-wrap is the bezel now) */
  .iframe-mobile-wrap{
    width:auto; max-width:none; height:auto;
    padding:0; margin:0;
    background:transparent; border:0; box-shadow:none;
  }
  .iframe-mobile-wrap::before{display:none}

  /* Intro / closing / validation slides have NO iframe; the commentary panel
     already shows their content. Drop the duplicate no-frame card on mobile. */
  body.no-iframe-slide .frame-pane{display:none}
  body.no-iframe-slide .mobile-hint{display:none}

  .btn{padding:8px 12px; font-size:12.5px}
  .progress .label{font-size:10.5px}
}

/* Extra-narrow phones — hide brand text, shrink mode buttons further */
@media (max-width: 420px){
  .topbar .brand span{display:none}
  .mode-seg button{padding:5px 7px; font-size:11px}
  .btn{padding:7px 10px; font-size:12px}
}
</style>
</head>
<body>
<div class="stage">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand">
      <img src="assets/navanso-mark.png" alt="Navanso"/>
      <span>Navanso</span>
    </div>
    <span class="title">Parcours commenté</span>
    <div class="spacer"></div>
    <div class="mode-seg" id="modeSeg">
      <button data-mode="defense" data-i18n="mode.defense"  title="Parcours défense — 11 slides, ≈ 4 min">Défense</button>
      <button data-mode="parent"  data-i18n="mode.parent"   title="Validation côté parent — 9 slides, ≈ 3-4 min">Parent</button>
      <button data-mode="tutor"   data-i18n="mode.tutor"    title="Validation côté enseignant — 10 slides, ≈ 5-6 min">Enseignant</button>
      <button data-mode="full"    data-i18n="mode.full"     title="Walkthrough complet — 26 slides">Complet</button>
    </div>
    <div class="lang-seg" id="langSeg" role="group" aria-label="Langue / اللغة">
      <button data-lang="fr" title="Français">FR</button>
      <button data-lang="ar" title="العربية">ع</button>
    </div>
    <select id="picker" class="pick" title="Aller à un écran"></select>
    <button class="help-btn" id="helpBtn">⌨ Raccourcis</button>
  </header>

  <!-- FRAME -->
  <div class="frame-pane" id="framePane">
    <!-- Hint banner shown only on mobile; hidden on text-only slides -->
    <div class="mobile-hint" id="mobileHint">
      <span class="ic">👆</span>
      <span>Faites défiler ou touchez l'écran pour interagir comme dans l'application.</span>
    </div>
    <div class="frame-wrap" id="frameWrap"></div>
    <div class="frame-loading" id="frameLoading">Chargement…</div>
  </div>

  <!-- COMMENTARY -->
  <aside class="comm-pane" id="commPane"></aside>

  <!-- FOOTER -->
  <footer class="footer">
    <button class="btn" id="prevBtn">← Précédent</button>
    <div class="progress">
      <div class="bar"><i id="progBar"></i></div>
      <div class="label"><span id="progLbl">—</span></div>
    </div>
    <button class="btn primary" id="nextBtn">Suivant →</button>
  </footer>
</div>

<!-- HELP -->
<div class="help-overlay" id="helpOv">
  <div class="box">
    <h3>Raccourcis clavier</h3>
    <div class="kr"><span class="key">→</span> Slide suivante</div>
    <div class="kr"><span class="key">←</span> Slide précédente</div>
    <div class="kr"><span class="key">Home</span> Première slide</div>
    <div class="kr"><span class="key">End</span> Dernière slide</div>
    <div class="kr"><span class="key">F</span> Plein écran (recommandé pour le jury)</div>
    <div class="kr"><span class="key">?</span> Cette aide</div>
    <div class="kr"><span class="key">Esc</span> Fermer</div>
  </div>
</div>

<!-- GUIDELINES — shown on first entry to Mode Parent / Mode Enseignant -->
<div class="help-overlay" id="guideOv">
  <div class="box" id="guideBox" style="max-width:560px">
    <div id="guideContent"></div>

/* B19 — Four viewing modes:
   - "defense" : 11-slide spine for the jury (~ 4 min)
   - "parent"  : 9-slide validation path for parents (~ 3-4 min)
   - "tutor"   : 10-slide validation path for tutors (~ 5-6 min)
   - "full"    : all 26 product slides for axe 6 / mémoire / internal review
   Validation closings (slides 26, 27) only appear in parent/tutor modes. */
const MODES = {
  defense: { label:'Défense',     indexes:[0, 1, 3, 4, 6, 7, 13, 17, 19, 20, 25] },
  parent:  { label:'Parent',      indexes:[0, 1, 3, 4, 5, 6, 19, 20, 26] },
  tutor:   { label:'Enseignant',  indexes:[0, 4, 7, 10, 13, 11, 17, 20, 24, 27] },
  full:    { label:'Complet',     indexes:null }, // null = all non-validation slides
};

// Mode resolution order:
//   1. URL param ?mode=parent|tutor|defense|full (lets us share pre-configured links)
//   2. localStorage previous choice
//   3. fallback 'defense'
// Old 'demo' key migrates to 'defense'.
const urlMode = new URLSearchParams(location.search).get('mode');
const savedMode = localStorage.getItem('nv_wt_mode');
let mode = MODES[urlMode] ? urlMode
         : (savedMode === 'demo') ? 'defense'
         : (MODES[savedMode] ? savedMode : 'defense');
// If the URL forced a mode, persist it so refreshes keep the same view.
if(MODES[urlMode]) localStorage.setItem('nv_wt_mode', urlMode);

function computeViewSlides(){
  const def = MODES[mode] || MODES.defense;
  if(def.indexes) return def.indexes.map(idx => SLIDES[idx]);
  // 'full' = every slide except validation closings (26, 27)
  return SLIDES.filter(s => !s.validationClosing);
}

/* (Re)build the picker dropdown based on current mode */

    const o = document.createElement('option');
    o.value = idx;
    o.textContent = `${String(idx+1).padStart(2,'0')} · ${tr(s,'title')}`;
    picker.appendChild(o);
  });
}

function setMode(m){

  rebuildPicker();

}

const guideOv      = document.getElementById('guideOv');

function maybeShowGuidelines(modeName){
  if(modeName !== 'parent' && modeName !== 'tutor') return;
  const seenKey = 'nv_wt_guide_' + modeName;
  if(localStorage.getItem(seenKey) === '1') return;

function showGuidelines(modeName){
  const lang = (wtLang === 'ar') ? 'ar' : 'fr';
  const g = (GUIDE_TEXTS[lang] && GUIDE_TEXTS[lang][modeName]) || GUIDE_TEXTS.fr[modeName];

/* Initial-load trigger for guidelines.
   Priority:
   1. If URL has ?mode=parent or ?mode=tutor → ALWAYS show the modal (shared
      link likely opened by someone new, regardless of stored seen-flag).
   2. Otherwise, only show on the very first entry per browser (seen-flag).
   This script tag runs after the DOM is built, so we call it immediately
   without waiting for DOMContentLoaded (which may have already fired). */
(function initGuidelines(){
  const urlModeNow = new URLSearchParams(location.search).get('mode');
  if(urlModeNow === 'parent' || urlModeNow === 'tutor'){
    // Reset the seen-flag so the shared link always greets the new viewer.
    localStorage.removeItem('nv_wt_guide_' + urlModeNow);
    showGuidelines(urlModeNow);
    return;
  }
  if(mode === 'parent' || mode === 'tutor'){
    maybeShowGuidelines(mode);
  }
})();

/* ───── Language toggle ─────
   Wires the FR/ع buttons in the topbar. Switching:
   - writes 'nv_lang' to localStorage (shared with the prototype iframe)
   - updates <html dir> + <html lang>
   - re-applies translated strings to topbar/footer/hint/etc.
   - reloads the iframe with a fresh cache-bust so the prototype picks up
     the new language too. */
const langBtns = [...document.querySelectorAll('.lang-seg [data-lang]')];
function syncLangButtons(){
  langBtns.forEach(b => b.classList.toggle('on', b.dataset.lang === wtLang));
}
function applyLang(){
  // Topbar
  const titleEl = document.querySelector('.topbar .title');
  if(titleEl) titleEl.textContent = wt('topbar.title');
  const helpBtnEl = document.getElementById('helpBtn');
  if(helpBtnEl) helpBtnEl.textContent = wt('topbar.help');
  picker.title = wt('topbar.picker');
  // Mode buttons
  modeBtns.forEach(b => {
    const key = b.dataset.i18n;
    if(key) b.textContent = wt(key);
  });
  // Mobile hint
  const hint = document.getElementById('mobileHint');
  if(hint){
    const spans = hint.querySelectorAll('span');
    if(spans.length>=2) spans[1].textContent = wt('mobileHint');
  }
  // Frame loading
  const fl = document.getElementById('frameLoading');
  if(fl) fl.textContent = wt('loading');
  // Footer
  prevBtn.textContent = wt('prev');
  nextBtn.textContent = wt('next');
  syncLangButtons();
}
function setWtLang(lang){
  if(lang!=='fr' && lang!=='ar') return;
  if(wtLang === lang) return;
  wtLang = lang;
  localStorage.setItem('nv_lang', lang);
  document.documentElement.dir = lang==='ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  applyLang();
  rebuildPicker();   // option labels use wt() indirectly via slide titles (still FR for slides)
  render();          // re-render commentary to update "Pourquoi ça compte" / "En une phrase" headings
  // Reload the iframe so the prototype inside re-reads localStorage and renders
  // in the new language. Skip if there's no iframe (no-frame slide).
  if(currentFrame && viewSlides[i] && viewSlides[i].hash){
    setSrc(viewSlides[i]);
  }
}
langBtns.forEach(b => b.addEventListener('click', () => setWtLang(b.dataset.lang)));
syncLangButtons();
applyLang();

function buildFrame(slide){
  // (re)create the frame element only if mobile/desktop changed or hash differs.
  const wantMobile = !!slide.mobile;
  if(lastMobile === wantMobile && currentFrame && lastHash !== slide.hash){
    // reuse: just update src
    setSrc(slide);
    return;
  }
  frameWrap.innerHTML = '';
  if(!slide.hash){
    renderNoFrame(slide);
    currentFrame = null; lastMobile = null; lastHash = null;
    return;
  }
  if(wantMobile){
    const wrap = document.createElement('div');
    wrap.className = 'iframe-mobile-wrap';
    const f = document.createElement('iframe');
    f.className = 'iframe-mobile';
    f.id = 'protoFrame';
    wrap.appendChild(f);
    frameWrap.appendChild(wrap);
    currentFrame = f;
  } else {
    const f = document.createElement('iframe');
    f.className = 'iframe-desktop';
    f.id = 'protoFrame';
    frameWrap.appendChild(f);
    currentFrame = f;
  }
  lastMobile = wantMobile;
  setSrc(slide);
}

function setSrc(slide){
  if(!currentFrame) return;
  frameLoading.classList.add('on');
  /* embed=1 tells the prototype to hide its internal pager ("Écrans"
     button + 5/13 counter + "Prototype expérimental" pill) — they would
     otherwise compete with the walkthrough's own numbering. */
  const url = `${PROTO}?embed=1&wt=${Date.now()}#${slide.hash}`;
  currentFrame.onload = () => {
    // Wait a beat for Babel + React mount before running preCmd / scroll
    setTimeout(()=>{
      try{
        const win = currentFrame.contentWindow;
        if(slide.preCmd && win){ try{ win.eval(slide.preCmd); }catch(e){console.warn('preCmd',e);} }
        // Re-trigger the hash routing so screen mounts (preCmd may have mutated store)
        if(win){ win.location.hash = slide.hash; }
        // Hide the prototype's internal scrollbar so we don't have two
        // competing scroll surfaces on mobile (page + iframe).
        try{
          const doc = currentFrame.contentDocument;
          if(doc && !doc.querySelector('#wt-scroll-hide')){
            const s = doc.createElement('style');
            s.id = 'wt-scroll-hide';
            s.textContent = '.app-scroll::-webkit-scrollbar{display:none}.app-scroll{scrollbar-width:none}html,body{scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}';
            doc.head.appendChild(s);
          }
        }catch(e){}
        if(slide.scrollText){
          setTimeout(()=>{
            try{
              const doc = currentFrame.contentDocument;
              const target = [...doc.querySelectorAll('h1,h2,h3,.eyebrow')].find(h=>h.textContent.toLowerCase().includes(slide.scrollText.toLowerCase()));
              if(target) target.scrollIntoView({block:'start', behavior:'instant'});
            }catch(e){}
          }, 700);
        }
      }catch(e){console.warn(e);}
      frameLoading.classList.remove('on');
    }, 600);
  };
  currentFrame.src = url;
  lastHash = slide.hash;
}

function renderNoFrame(slide){
  const wrap = document.createElement('div');
  wrap.className = 'no-frame';
  let html = `<div class="card"><span class="kicker">${tr(slide,'actLabel')}</span><h2>${tr(slide,'title')}</h2>`;
  (tr(slide,'body')||[]).forEach(p=>{ html += `<p>${p}</p>`; });
  if(slide.layers){
    html += `<div class="layers">
      <div class="layer l1"><div class="num">1</div><div><h4>${wtLang==='ar'?'الوعد الجوهري — الثّقة والتقدّم':'Promesse cœur — trust & progress'}</h4><p>${wtLang==='ar'?'إيجاد أستاذ موثوق وإثبات تقدّم التّلميذ.':'Trouver un enseignant de confiance et prouver le progrès de l\'élève.'}</p></div></div>
      <div class="layer l2"><div class="num">2</div><div><h4>${wtLang==='ar'?'المتابعة العمليّة':'Workflow opérationnel'}</h4><p>${wtLang==='ar'?'أفواج · حصص · حضور · ملاحظات · تقارير.':'Groupes · séances · attendance · remarques · rapports.'}</p></div></div>
      <div class="layer l3"><div class="num">3</div><div><h4>${wtLang==='ar'?'أدوات تكميليّة':'Outils complémentaires'}</h4><p>${wtLang==='ar'?'مدفوعات · جدول · مهام · رسائل جماعيّة.':'Paiements · planning · tâches · broadcasts.'}</p></div></div>
    </div>`;
  }
  html += `</div>`;
  wrap.innerHTML = html;
  frameWrap.appendChild(wrap);
}

function renderCommentary(slide){
  const cls = slide.act || 'intro';
  let html = `
    <div class="act-row">
      <span class="act-badge ${cls}">${tr(slide,'actLabel')}</span>
      <span class="step-num">${String(i+1).padStart(2,'0')} / ${viewSlides.length}</span>
    </div>
    <h2 class="title">${tr(slide,'title')}</h2>
    <div class="commentary">`;
  (tr(slide,'body')||[]).forEach(p=>{ html += `<p>${p}</p>`; });
  html += `</div>`;
  const why = tr(slide,'why');
  if(why){
    html += `<div class="why"><span class="eyebrow">${wt('why')}</span><p>${why}</p></div>`;
  }
  const quote = tr(slide,'quote');
  if(quote){
    html += `<div class="quote"><span>${wt('quote')}</span><p>« ${quote} »</p></div>`;
  }
  commPane.innerHTML = html;
  commPane.scrollTop = 0;
}

/* Map each act to a brand colour. Used to tint the left accent stripe on the
   commentary panel so the eye instantly recognises which part of the story
   the screen belongs to. */
const ACT_COLORS = {
  intro:'#5B6678',
  a1:'#1F8A6D', a2:'#2456B5', a3:'#D8632E',
  outils:'#3F4A60',
  close:'#86E5C7',
  'valid-parent':'#1F8A6D',
  'valid-tutor':'#2456B5',
};

function render(){
  if(i >= viewSlides.length) i = viewSlides.length - 1;
  const slide = viewSlides[i];
  buildFrame(slide);
  renderCommentary(slide);
  // Hide the mobile hint on text-only slides (intro/closing/validation)
  const hint = document.getElementById('mobileHint');
  if(hint) hint.style.display = slide.hash ? '' : 'none';
  // Mark the body when the slide has no iframe — used by mobile CSS to
  // hide the duplicated no-frame card (commentary already carries the same text)
  document.body.classList.toggle('no-iframe-slide', !slide.hash);
  // Set the commentary accent stripe colour for this act
  commPane.style.setProperty('--act-color', ACT_COLORS[slide.act] || ACT_COLORS.intro);
  // progress
  const denom = Math.max(1, viewSlides.length - 1);
  const pct = (i/denom) * 100;
  progBar.style.width = pct + '%';
  progLbl.textContent = wt('progress', {n:i+1, total:viewSlides.length, act:slide.actLabel});
  picker.value = i;
  prevBtn.disabled = i===0;
  nextBtn.disabled = i===viewSlides.length-1;
}

function next(){ if(i<viewSlides.length-1){ i++; render(); } }
function prev(){ if(i>0){ i--; render(); } }
function goTo(n){ i = Math.max(0, Math.min(viewSlides.length-1, n)); render(); }

prevBtn.addEventListener('click', prev);
nextBtn.addEventListener('click', next);

document.addEventListener('keydown', e => {
  if(helpOv.classList.contains('on')){
    if(e.key==='Escape' || e.key==='?') { helpOv.classList.remove('on'); }
    return;
  }
  if(e.target.tagName==='SELECT' || e.target.tagName==='INPUT') return;
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') { e.preventDefault(); next(); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp')             { e.preventDefault(); prev(); }
  else if(e.key==='Home')                                     { e.preventDefault(); goTo(0); }
  else if(e.key==='End')                                      { e.preventDefault(); goTo(viewSlides.length-1); }
  else if(e.key==='f'||e.key==='F'){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  else if(e.key==='?'){ helpOv.classList.add('on'); }
});

helpBtn.addEventListener('click', ()=> helpOv.classList.add('on'));
helpOv.addEventListener('click', e => { if(e.target===helpOv) helpOv.classList.remove('on'); });

render();
</script>
</body>
</html>
